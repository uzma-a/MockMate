{% load static %}
<!DOCTYPE html>
<html lang="en" data-bs-theme='dark'> 
  
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>
        {% block title %}
        Mock Testing
        {% endblock %}
    </title>
    <style>
      body{
        
        color:rgb(236, 240, 245);
      }
      .navbar{
        background:linear-gradient(135deg,rgb(46, 36, 94) 0%,rgb(6, 19, 41) 100%);;
      }
  .navbar-brand {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg,#0dfddd, #2575fc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    color: transparent;
    font-weight: 800;
  }

  .nav-item a {
    padding: 8px 16px;
    margin: 0 8px;
    border-radius: 8px;
    font-weight: 500;
    background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
    color: white !important;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }

  .nav-item a:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(5, 8, 46, 1);
    text-decoration: none;
  }

  .navbar {
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
  }
</style>
</head>
<body >
    <nav class="navbar navbar-expand-lg ">
       <div class="container-fluid">
      <a class="navbar-brand" href="{% url 'home' %}">MockMate</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
        data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
        aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      </div>

    <div class="collapse navbar-collapse justify-content-around" id="navbarSupportedContent">
      <ul class="navbar-nav mb-2 mb-lg-0 d-flex flex-row">
        <li class="nav-item">
          <a class="nav-link" href="{% url 'about' %}">About</a>
        </li>
        <li class="nav-item">
          <a class="nav-link text-nowrap" href="{% url 'progress' %}">Your Progress 🚀</a>
        </li>
      </ul>
    </div>
  
</nav>
    <div class="container">
        {% block content %}
        
        {% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
