<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: Arial, sans-serif; font-size: 12px; }
    h2 { color: #0d6efd; }
    .qa-block { margin-bottom: 20px; }
    .question { font-weight: bold; }
    .answer { margin-left: 10px; }
  </style>
</head>
<body>
  <h2>Mock Interview - Review Answers</h2>
  {% for item in answers %}
    <div class="qa-block">
      <p class="question">Q{{ forloop.counter }}: {{ item.question }}</p>
      <p class="answer">Your Answer: {{ item.answer|default:"(No answer given)" }}</p>
    </div>
  {% endfor %}
</body>
</html>
